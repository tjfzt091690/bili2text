<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bili2Text - Bilibili 视频转文本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Bili2Text</a>
            <span class="navbar-text text-muted">Bilibili Video to Text Tool</span>
        </div>
    </nav>

    <div class="container">
        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="download-tab" data-bs-toggle="tab"
                        data-bs-target="#download-panel" type="button" role="tab">Download Video</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="audio-tab" data-bs-toggle="tab"
                        data-bs-target="#audio-panel" type="button" role="tab">Split Audio</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="stt-tab" data-bs-toggle="tab"
                        data-bs-target="#stt-panel" type="button" role="tab">Speech to Text</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="output-tab" data-bs-toggle="tab"
                        data-bs-target="#output-panel" type="button" role="tab">View Results</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Download Panel -->
            <div class="tab-pane fade show active" id="download-panel" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        Download from Bilibili
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="videoUrl" class="form-label">Video URL or BV Number</label>
                            <input type="text" class="form-control" id="videoUrl"
                                   placeholder="https://www.bilibili.com/video/BVxxxxxxxxx or BVxxxxxxxxx">
                        </div>
                        <button class="btn btn-primary btn-lg w-100" onclick="startDownload()">
                            Start Download
                        </button>

                        <div class="progress-container mt-3" id="downloadProgress">
                            <div class="alert alert-info d-flex align-items-center">
                                <strong>Status:</strong>
                                <span class="ms-2 status-badge status-pending" id="dlStatus">Pending</span>
                                <span class="ms-auto" id="dlProgressText"></span>
                            </div>
                            <div class="log-area" id="dlLog"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Audio Split Panel -->
            <div class="tab-pane fade" id="audio-panel" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        Select Video Directory for Audio Extraction
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Downloaded Video Directories</label>
                            <select class="form-select" id="videoDirSelect">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        <button class="btn btn-success btn-lg w-100" onclick="startAudioSplit()">
                            Start Audio Split
                        </button>

                        <div class="progress-container mt-3" id="audioProgress">
                            <div class="alert alert-info d-flex align-items-center">
                                <strong>Status:</strong>
                                <span class="ms-2 status-badge status-pending" id="auStatus">Pending</span>
                                <span class="ms-auto" id="auProgressText"></span>
                            </div>
                            <div class="log-area" id="auLog"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- STT Panel -->
            <div class="tab-pane fade" id="stt-panel" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        Speech to Text (Whisper)
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Select Slice Folder</label>
                                <select class="form-select" id="sliceDirSelect">
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Model</label>
                                <select class="form-select" id="modelSelect">
                                    <option value="tiny">tiny (fastest)</option>
                                    <option value="base">base</option>
                                    <option value="small">small</option>
                                    <option value="medium">medium</option>
                                    <option value="large">large (most accurate)</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Prompt</label>
                                <input type="text" class="form-control" id="promptInput"
                                       placeholder="Loading config...">
                            </div>
                        </div>
                        <button class="btn btn-warning btn-lg w-100" onclick="startTranscribe()">
                            Start Transcription
                        </button>

                        <div class="progress-container mt-3" id="sttProgress">
                            <div class="alert alert-info d-flex align-items-center">
                                <strong>Status:</strong>
                                <span class="ms-2 status-badge status-pending" id="stStatus">Pending</span>
                                <span class="ms-auto" id="stProgressText"></span>
                            </div>
                            <div class="log-area" id="stLog"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Output Panel -->
            <div class="tab-pane fade" id="output-panel" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-secondary text-white">
                        Transcription Results
                    </div>
                    <div class="card-body">
                        <button class="btn btn-outline-secondary mb-3" onclick="loadOutputs()">
                            Refresh List
                        </button>
                        <div id="outputList">
                            <p class="text-muted">Click refresh to load results...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
